<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YKS — Efe</title>
    <!-- Modern & Clean Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141416;
            --border: #27272a;
            --primary: #3b82f6; /* Soft Blue */
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #6366f1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* 9:16 Mobile View */
        .app-container {
            width: 100%;
            max-width: 450px; /* Standart Mobile Width */
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* Header */
        header {
            padding: 24px 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .h-left h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        .h-left p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

        .yks-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            text-align: right;
        }
        .yks-badge b { color: var(--primary); font-size: 1.1rem; display: block; }
        .yks-badge span { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 100px;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Professional Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: block;
        }

        /* Pomodoro Timer - Minimalist */
        .timer-box {
            text-align: center;
            padding: 40px 0;
        }
        .time-display {
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: -0.05em;
            margin-bottom: 20px;
        }
        .timer-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 12px; }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); font-size: 0.8rem; padding: 8px 16px; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Audio Controls */
        .audio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 24px;
        }
        .audio-btn {
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
        }
        .audio-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        /* Topics List */
        .topic-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .topic-item:last-child { border-bottom: none; }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .checkbox.checked { background: var(--success); border-color: var(--success); }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; }
        .topic-text { flex: 1; font-size: 0.95rem; }
        .topic-text.done { color: var(--text-muted); text-decoration: line-through; }

        /* Navigation Bar */
        nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 30px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 0.65rem; font-weight: 500; }
        .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* Agenda / Program */
        .agenda-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .time-tag { font-size: 0.8rem; color: var(--primary); font-weight: 600; width: 45px; }
        .task-card { flex: 1; background: var(--surface); border-radius: 12px; padding: 12px; border-left: 3px solid var(--primary); }

        /* Inputs */
        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="h-left">
            <h1 id="welcome-text">Odaklan, Efe</h1>
            <p id="current-date">-- -- ----</p>
        </div>
        <div class="yks-badge">
            <b id="days-count">000</b>
            <span>Gün Kaldı</span>
        </div>
    </header>

    <main>
        <!-- DASHBOARD -->
        <section id="dash" class="page active">
            <div class="card">
                <span class="card-label">Haftalık Analiz</span>
                <canvas id="pomoChart" height="180"></canvas>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="card">
                    <span class="card-label">Tamamlanan</span>
                    <h2 id="total-pomo" style="font-size: 1.8rem;">0</h2>
                    <p style="font-size: 0.7rem; color: var(--text-muted)">Seans</p>
                </div>
                <div class="card">
                    <span class="card-label">İlerleme</span>
                    <h2 id="overall-prog" style="font-size: 1.8rem;">%0</h2>
                    <p style="font-size: 0.7rem; color: var(--text-muted)">Müfredat</p>
                </div>
            </div>
        </section>

        <!-- POMODORO -->
        <section id="pomo" class="page">
            <div class="card timer-box">
                <span class="card-label" id="timer-type">Çalışma Zamanı</span>
                <div class="time-display" id="time-val">25:00</div>
                
                <div class="timer-controls">
                    <button class="btn btn-ghost" onclick="setTimer(25)">25dk</button>
                    <button class="btn btn-ghost" onclick="setTimer(50)">50dk</button>
                    <button class="btn btn-ghost" onclick="setTimer(5, true)">5dk Mola</button>
                </div>

                <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">BAŞLAT</button>
                
                <div class="audio-grid">
                    <button class="audio-btn" onclick="toggleAudio('rain', this)">Yağmur</button>
                    <button class="audio-btn" onclick="toggleAudio('lofi', this)">Lo-fi</button>
                    <button class="audio-btn" onclick="toggleAudio('forest', this)">Orman</button>
                </div>
            </div>
        </section>

        <!-- KONULAR -->
        <section id="topi" class="page">
            <div class="card">
                <span class="card-label">TYT Matematik</span>
                <div id="topic-list">
                    <!-- Topics via JS -->
                </div>
            </div>
        </section>

        <!-- PROGRAM -->
        <section id="prog" class="page">
            <div class="card">
                <span class="card-label">Günlük Plan</span>
                <div id="agenda-container">
                    <!-- Agenda via JS -->
                </div>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="addEntry()">+ Yeni Görev</button>
            </div>
        </section>

        <!-- RAPOR -->
        <section id="tgrm" class="page">
            <div class="card">
                <span class="card-label">Raporlama Servisi</span>
                <input type="text" id="tg-token" placeholder="Telegram Bot Token">
                <input type="text" id="tg-id" placeholder="Chat ID">
                <button class="btn btn-secondary" style="width: 100%" onclick="saveConfig()">Ayarları Kaydet</button>
                <button class="btn btn-primary" onclick="sendReport()">Raporu Gönder</button>
            </div>
        </section>
    </main>

    <nav>
        <div class="nav-item active" onclick="nav('dash')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Özet</span>
        </div>
        <div class="nav-item" onclick="nav('pomo')">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>Odak</span>
        </div>
        <div class="nav-item" onclick="nav('topi')">
            <svg class="nav-icon" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            <span>Konu</span>
        </div>
        <div class="nav-item" onclick="nav('prog')">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>Plan</span>
        </div>
        <div class="nav-item" onclick="nav('tgrm')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            <span>Rapor</span>
        </div>
    </nav>
</div>

<!-- REAL AMBIENT SOUNDS -->
<audio id="snd-rain" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio> <!-- Replace with actual Rain URL -->
<audio id="snd-lofi" loop src="https://luan.xyz/files/audio/ambient_c_base.mp3"></audio>
<audio id="snd-forest" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<script>
    // --- DATA ---
    const YKS_DATE = new Date("June 20, 2026 10:00:00").getTime();
    const TOPICS_DB = ["Temel Kavramlar", "Sayı Basamakları", "Problemler", "Mantık", "Fonksiyonlar", "Trigonometri", "Limit ve Süreklilik"];
    
    let db = JSON.parse(localStorage.getItem('yks_v7')) || {
        pomo: 0, 
        doneTopics: [], 
        agenda: [{t:"08:00", d:"Paragraf Rutini"}, {t:"10:00", d:"Alan Denemesi"}],
        history: {},
        tg: {token: "", id: ""}
    };

    // --- INIT ---
    window.onload = () => {
        updateDate();
        renderTopics();
        renderAgenda();
        updateStats();
        initChart();
        setInterval(updateDate, 60000);
    };

    function updateDate() {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('tr-TR', {day:'numeric', month:'long', year:'numeric'});
        const diff = YKS_DATE - now.getTime();
        document.getElementById('days-count').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function save() { localStorage.setItem('yks_v7', JSON.stringify(db)); updateStats(); }

    // --- NAV ---
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- POMODORO ---
    let timer;
    let time = 1500;
    let isRunning = false;
    let activeSnd = null;

    function setTimer(m, isMola = false) {
        clearInterval(timer);
        isRunning = false;
        time = m * 60;
        document.getElementById('timer-type').innerText = isMola ? "Dinlenme" : "Çalışma Zamanı";
        updateDisplay();
        document.getElementById('start-btn').innerText = "BAŞLAT";
    }

    function toggleTimer() {
        if(isRunning) {
            clearInterval(timer);
            document.getElementById('start-btn').innerText = "DEVAM ET";
        } else {
            timer = setInterval(() => {
                time--;
                updateDisplay();
                if(time <= 0) {
                    clearInterval(timer);
                    db.pomo++;
                    const key = new Date().toISOString().split('T')[0];
                    db.history[key] = (db.history[key] || 0) + 1;
                    save();
                    alert("Seans bitti, Efe.");
                    setTimer(25);
                }
            }, 1000);
            document.getElementById('start-btn').innerText = "DURAKLAT";
        }
        isRunning = !isRunning;
    }

    function updateDisplay() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('time-val').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function toggleAudio(type, el) {
        if(activeSnd) {
            activeSnd.pause();
            document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
        }
        const s = document.getElementById('snd-' + type);
        if(activeSnd === s) {
            activeSnd = null;
        } else {
            s.play();
            activeSnd = s;
            el.classList.add('active');
        }
    }

    // --- TOPICS ---
    function renderTopics() {
        const cont = document.getElementById('topic-list');
        cont.innerHTML = "";
        TOPICS_DB.forEach(t => {
            const isDone = db.doneTopics.includes(t);
            const item = document.createElement('div');
            item.className = 'topic-item';
            item.innerHTML = `
                <div class="checkbox ${isDone ? 'checked' : ''}" onclick="toggleTopic('${t}')"></div>
                <div class="topic-text ${isDone ? 'done' : ''}">${t}</div>
            `;
            cont.appendChild(item);
        });
    }

    function toggleTopic(t) {
        if(db.doneTopics.includes(t)) db.doneTopics = db.doneTopics.filter(x => x !== t);
        else db.doneTopics.push(t);
        save(); renderTopics();
    }

    // --- AGENDA ---
    function renderAgenda() {
        const cont = document.getElementById('agenda-container');
        cont.innerHTML = "";
        db.agenda.forEach(a => {
            cont.innerHTML += `
                <div class="agenda-row">
                    <div class="time-tag">${a.t}</div>
                    <div class="task-card">${a.d}</div>
                </div>
            `;
        });
    }

    function addEntry() {
        const d = prompt("Görev?");
        const t = prompt("Saat? (00:00)");
        if(d && t) { db.agenda.push({t, d}); save(); renderAgenda(); }
    }

    // --- STATS ---
    function updateStats() {
        document.getElementById('total-pomo').innerText = db.pomo;
        const prog = Math.round((db.doneTopics.length / TOPICS_DB.length) * 100);
        document.getElementById('overall-prog').innerText = `%${prog}`;
    }

    function initChart() {
        const ctx = document.getElementById('pomoChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum'],
                datasets: [{
                    data: [2, 5, 3, 6, 4], // Placeholder
                    backgroundColor: '#3b82f6',
                    borderRadius: 6
                }]
            },
            options: { 
                responsive: true, 
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#a1a1aa' } } }
            }
        });
    }

    // --- TELEGRAM ---
    function saveConfig() {
        db.tg.token = document.getElementById('tg-token').value;
        db.tg.id = document.getElementById('tg-id').value;
        save(); alert("Kaydedildi.");
    }

    async function sendReport() {
        const text = `📊 YKS Özet Raporu (Efe)\n------------------\nSeans: ${db.pomo}\nİlerleme: %${Math.round((db.doneTopics.length / TOPICS_DB.length) * 100)}`;
        await fetch(`https://api.telegram.org/bot${db.tg.token}/sendMessage?chat_id=${db.tg.id}&text=${encodeURIComponent(text)}`);
        alert("Gönderildi.");
    }
</script>
</body>
</html>
